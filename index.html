<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Aleatorio - Dark Mode</title>
    <style>
        :root {
            /* Colores inspirados en interfaces oscuras modernas como Gemini */
            --bg-color: #0f0f11;
            --card-color: #1e1f22;
            --text-color: #f0f4f9;
            --text-secondary: #9aa0a6;
            --accent-color: #a8c7fa; /* Azul claro suave */
            --accent-gradient: linear-gradient(135deg, #a8c7fa 0%, #c2e7ff 100%);
            --border-color: #333538;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-color);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 2rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        #visualizador {
            font-size: 2.8rem;
            font-weight: 600;
            margin: 2.5rem 0;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Aplicamos el degradado brillante al texto */
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.2s ease, opacity 0.2s ease;
            line-height: 1.2;
        }

        .controles {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .selector-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        select {
            padding: 8px 16px;
            font-size: 0.95rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #131314;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(168, 199, 250, 0.2);
        }

        button {
            background: var(--accent-gradient);
            color: #0f0f11; /* Texto oscuro para contrastar con el botón claro */
            border: none;
            padding: 12px 28px;
            font-size: 0.95rem;
            border-radius: 30px; /* Estilo píldora muy moderno */
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s ease, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(168, 199, 250, 0.2);
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.97);
        }

        #status {
            font-size: 0.85rem;
            color: #f28b82; /* Rojo suave para errores en tema oscuro */
            margin-top: 10px;
            max-width: 90%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Elemento Aleatorio</h1>
    
    <!-- Aquí se mostrará el elemento seleccionado -->
    <div id="visualizador">Cargando...</div>

    <div class="controles">
        <div class="selector-wrapper">
            <label for="intervalo">Intervalo:</label>
            <select id="intervalo">
                <option value="5000">5 segundos</option>
                <option value="10000">10 segundos</option>
                <option value="15000">15 segundos</option>
                <option value="30000">30 segundos</option>
            </select>
        </div>
        
        <button id="btnSiguiente">Siguiente</button>
        <div id="status"></div>
    </div>
</div>

<script>
    let elementos = [];
    let temporizador = null;
    
    const visualizador = document.getElementById('visualizador');
    const selectorIntervalo = document.getElementById('intervalo');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const statusDiv = document.getElementById('status');

    // 1. Cargar el archivo TXT
    async function cargarElementos() {
        try {
            const respuesta = await fetch('elementos.txt');
            if (!respuesta.ok) {
                throw new Error('No se pudo abrir el archivo elementos.txt');
            }
            const texto = await respuesta.text();
            
            elementos = texto.split('\n')
                             .map(linea => linea.trim())
                             .filter(linea => linea.length > 0);

            if (elementos.length === 0) {
                visualizador.textContent = "El archivo está vacío";
                return;
            }

            statusDiv.textContent = ""; 
            mostrarElementoAleatorio();
            iniciarTemporizador();

        } catch (error) {
            console.error(error);
            visualizador.textContent = "Error";
            statusDiv.textContent = "Verifica que 'elementos.txt' esté en la misma carpeta del repositorio de GitHub.";
        }
    }

    // 2. Elegir y mostrar elemento
    function mostrarElementoAleatorio() {
        if (elementos.length === 0) return;
        
        // Animación suave de cambio
        visualizador.style.opacity = '0';
        visualizador.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
            const indiceAleatorio = Math.floor(Math.random() * elementos.length);
            visualizador.textContent = elementos[indiceAleatorio];
            visualizador.style.opacity = '1';
            visualizador.style.transform = 'scale(1)';
        }, 150);
    }

    // 3. Temporizador
    function iniciarTemporizador() {
        clearInterval(temporizador);
        const tiempoMs = parseInt(selectorIntervalo.value);
        temporizador = setInterval(() => {
            mostrarElementoAleatorio();
        }, tiempoMs);
    }

    // Eventos
    selectorIntervalo.addEventListener('change', iniciarTemporizador);

    btnSiguiente.addEventListener('click', () => {
        mostrarElementoAleatorio();
        iniciarTemporizador(); // Reinicia el contador para que no salte inmediatamente después del clic
    });

    // Arrancar la app
    cargarElementos();
</script>

</body>
</html>
