<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Pasos de Baile</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-color: #1e1f22;
            --text-color: #f0f4f9;
            --text-secondary: #9aa0a6;
            --accent-color: #a8c7fa;
            --accent-gradient: linear-gradient(135deg, #a8c7fa 0%, #c2e7ff 100%);
            --border-color: #333538;
            --pause-color: #f28b82;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-color);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        #estado-timer {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 1rem;
            font-weight: 600;
            background-color: rgba(168, 199, 250, 0.1);
            color: var(--accent-color);
        }

        #estado-timer.en-pausa {
            background-color: rgba(242, 139, 130, 0.1);
            color: var(--pause-color);
        }

        #visualizador {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 1.5rem 0 2.5rem 0;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.2s ease, opacity 0.2s ease;
            line-height: 1.2;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .selector-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        select {
            padding: 8px 16px;
            font-size: 0.95rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #131314;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(168, 199, 250, 0.2);
        }

        .botones-grupo {
            display: flex;
            gap: 12px;
            margin-top: 0.5rem;
        }

        button {
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s ease, opacity 0.2s, background-color 0.3s;
        }

        #btnSiguiente {
            background: var(--accent-gradient);
            color: #0f0f11;
            box-shadow: 0 4px 15px rgba(168, 199, 250, 0.2);
        }

        #btnPausa {
            background-color: #2b2d31;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        #btnPausa.pausado {
            background-color: var(--pause-color);
            color: #0f0f11;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.97);
        }

        #status {
            font-size: 0.85rem;
            color: #f28b82;
            margin-top: 10px;
            max-width: 90%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Selector de Pasos</h1>
    
    <!-- Indicador de estado -->
    <div id="estado-timer">● Activo</div>

    <!-- Muestra el elemento seleccionado -->
    <div id="visualizador">Cargando...</div>

    <div class="controles">
        <!-- Selector de Ritmo -->
        <div class="selector-wrapper">
            <label for="ritmo">Ritmo:</label>
            <select id="ritmo">
                <option value="cumbia.txt">Cumbia</option>
                <option value="bachata.txt">Bachata</option>
                <option value="salsa.txt">Salsa</option>
            </select>
        </div>

        <!-- Selector de Intervalo -->
        <div class="selector-wrapper">
            <label for="intervalo">Cambiar cada:</label>
            <select id="intervalo">
                <option value="5000">5 segundos</option>
                <option value="10000">10 segundos</option>
                <option value="15000">15 segundos</option>
                <option value="30000">30 segundos</option>
            </select>
        </div>
        
        <!-- Botones de Acción -->
        <div class="botones-grupo">
            <button id="btnPausa">Pausar</button>
            <button id="btnSiguiente">Siguiente</button>
        </div>

        <div id="status"></div>
    </div>
</div>

<script>
    let elementos = [];
    let temporizador = null;
    let estaPausado = false;
    
    const visualizador = document.getElementById('visualizador');
    const selectorRitmo = document.getElementById('ritmo');
    const selectorIntervalo = document.getElementById('intervalo');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnPausa = document.getElementById('btnPausa');
    const estadoTimer = document.getElementById('estado-timer');
    const statusDiv = document.getElementById('status');

    // Cargar archivo según el ritmo seleccionado
    async function cargarElementos() {
        const archivoActual = selectorRitmo.value;
        statusDiv.textContent = "";

        try {
            const respuesta = await fetch(archivoActual);
            if (!respuesta.ok) {
                throw new Error(`No se encontró el archivo ${archivoActual}`);
            }
            const texto = await respuesta.text();
            
            elementos = texto.split('\n')
                             .map(linea => linea.trim())
                             .filter(linea => linea.length > 0);

            if (elementos.length === 0) {
                visualizador.textContent = "El archivo está vacío";
                return;
            }

            mostrarElementoAleatorio();
            
            // Al cambiar de ritmo reanudamos el tiempo si estaba en pausa
            estaPausado = false;
            actualizarInterfazPausa();
            iniciarTemporizador();

        } catch (error) {
            console.error(error);
            visualizador.textContent = "Error";
            statusDiv.textContent = `Asegúrate de haber creado el archivo '${archivoActual}' en tu repositorio.`;
        }
    }

    // Elegir y mostrar un elemento aleatorio
    function mostrarElementoAleatorio() {
        if (elementos.length === 0) return;
        
        visualizador.style.opacity = '0';
        visualizador.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
            const indiceAleatorio = Math.floor(Math.random() * elementos.length);
            visualizador.textContent = elementos[indiceAleatorio];
            visualizador.style.opacity = '1';
            visualizador.style.transform = 'scale(1)';
        }, 150);
    }

    // Control del temporizador
    function iniciarTemporizador() {
        clearInterval(temporizador);
        if (estaPausado) return; // Si está en pausa, no iniciamos el intervalo

        const tiempoMs = parseInt(selectorIntervalo.value);
        temporizador = setInterval(() => {
            mostrarElementoAleatorio();
        }, tiempoMs);
    }

    // Función para alternar Pausa / Reanudar
    function alternarPausa() {
        estaPausado = !estaPausado;
        actualizarInterfazPausa();

        if (estaPausado) {
            clearInterval(temporizador);
        } else {
            iniciarTemporizador();
        }
    }

    // Actualiza la apariencia visual del botón e indicador
    function actualizarInterfazPausa() {
        if (estaPausado) {
            btnPausa.textContent = "Reanudar";
            btnPausa.classList.add('pausado');
            estadoTimer.textContent = "❚❚ Pausado";
            estadoTimer.classList.add('en-pausa');
        } else {
            btnPausa.textContent = "Pausar";
            btnPausa.classList.remove('pausado');
            estadoTimer.textContent = "● Activo";
            estadoTimer.classList.remove('en-pausa');
        }
    }

    // Escuchadores de eventos
    selectorRitmo.addEventListener('change', cargarElementos);
    selectorIntervalo.addEventListener('change', iniciarTemporizador);

    btnPausa.addEventListener('click', alternarPausa);

    btnSiguiente.addEventListener('click', () => {
        mostrarElementoAleatorio();
        // Si no está pausado, reiniciamos el conteo para dar el tiempo completo del intervalo
        if (!estaPausado) {
            iniciarTemporizador();
        }
    });

    // Carga inicial
    cargarElementos();
</script>

</body>
</html>
